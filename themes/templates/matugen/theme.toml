    "{{ colors.primary_container.default.hex }}",
    "{{ colors.secondary_container.default.hex }}",
    "{{ colors.tertiary_container.default.hex }}",
    "{{ colors.error_container.default.hex }}",
    "{{ colors.surface_bright.default.hex }}",
    "{{ colors.surface_container_high.default.hex }}"
]
monitor_fill_colors_selected = [
    "{{ colors.primary.default.hex }}",
    "{{ colors.secondary.default.hex }}",
    "{{ colors.tertiary.default.hex }}",
    "{{ colors.error.default.hex }}",
    "{{ colors.surface_dim.default.hex }}",
    "{{ colors.surface_container.default.hex }}"
]
monitor_bottom_colors = [
    "{{ colors.primary.default.hex | set_lightness: 95.0 }}",
    "{{ colors.secondary.default.hex | set_lightness: 95.0 }}",
    "{{ colors.tertiary.default.hex | set_lightness: 95.0 }}",
    "{{ colors.error.default.hex | set_lightness: 95.0 }}",
    "{{ colors.primary_container.default.hex | set_lightness: 95.0 }}",
    "{{ colors.secondary_container.default.hex | set_lightness: 95.0 }}"
]

